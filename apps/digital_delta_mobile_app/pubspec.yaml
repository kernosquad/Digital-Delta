name: digital_delta
description: Digital Delta mobile application built with Clean Architecture.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Dependency Injection
  get_it: ^8.0.3

  # UI & Design
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  lottie: ^3.3.1
  flutter_animate: ^4.5.0
  toastification: ^3.0.3
  shimmer: ^3.0.0
  percent_indicator: ^4.2.5
  confetti: ^0.8.0
  simple_ripple_animation: ^0.1.0

  # Forms & Validation
  flutter_form_builder: ^10.1.0
  form_builder_validators: ^11.2.0

  # HTTP & Networking
  dio: ^5.7.0
  http_parser: ^4.0.0
  jwt_decoder: ^2.0.1
  google_sign_in: ^6.3.0

  # Data Persistence
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.2

  # Cryptography & Security (Module 1)
  otp: ^3.2.0
  pointycastle: ^3.9.1
  cryptography: ^2.8.0
  asn1lib: ^1.5.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  uuid: ^4.5.1
  device_info_plus: ^11.2.0
  battery_plus: ^6.2.1

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Localization & Formatting
  intl: ^0.20.2
  google_fonts: ^6.2.1

  # Media & File Handling
  image_picker: ^1.1.2
  file_picker: ^10.2.0
  record: ^6.0.0
  just_audio: ^0.9.36
  flutter_tts: ^4.2.3

  # Pagination
  infinite_scroll_pagination: ^4.1.0

  # UI Components
  carousel_slider_plus: ^7.1.1
  flutter_staggered_grid_view: ^0.7.0
  dotted_border: ^2.1.0
  avatar_glow: ^3.0.1
  flutter_spinkit: ^5.2.1
  animate_do: ^4.2.0

  # Content Display
  flutter_html: ^3.0.0
  flutter_markdown: ^0.7.4+1

  # Utilities
  logger: ^2.5.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  dartz: ^0.10.1
  crypto: ^3.0.6

  # Connectivity
  internet_connection_checker_plus: ^2.9.1+2
  connectivity_plus: ^7.1.1

  # Offline Database
  sqlite3: ^3.3.1

  # Map Visualization
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Bluetooth & Mesh Networking
  flutter_blue_plus: ^2.2.1
  flutter_reactive_ble: ^5.4.2
  bridgefy: ^1.1.11
  nearby_connections: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.4
  freezed: ^2.5.7

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/logo/

  fonts:
    - family: SFProDisplay
      fonts:
        - asset: assets/fonts/SF-Pro-Display-Regular.otf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
